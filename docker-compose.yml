services:
  # ── PHP-FPM (Laravel app) ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fandrio_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - REVERB_HOST=reverb
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fandrio

  # ── Nginx ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: fandrio_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8010}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - fandrio

  # ── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: fandrio_postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT_FORWARD:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-fandrio}
      POSTGRES_USER: ${DB_USERNAME:-fandrio}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
      - ./database/SQLRequetes:/docker-entrypoint-initdb.d/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-fandrio}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fandrio

  # ── Laravel Reverb (WebSockets) ────────────────────────────────────
  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fandrio_reverb
    restart: unless-stopped
    working_dir: /var/www
    entrypoint: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    ports:
      - "${REVERB_PORT_FORWARD:-8080}:8080"
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - REVERB_HOST=reverb
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fandrio

  # ── Scheduler (cron tasks) ─────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fandrio_scheduler
    restart: unless-stopped
    working_dir: /var/www
    entrypoint: ["php", "artisan", "schedule:work"]
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - REVERB_HOST=reverb
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fandrio

  # ── Gestion statuts voyages (boucle toutes les 5 min) ─────────────
  voyagestatus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fandrio_voyagestatus
    restart: unless-stopped
    working_dir: /var/www
    entrypoint: ["/bin/bash", "-c", "while true; do php artisan voyages:gestion-statuts; sleep 300; done"]
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - REVERB_HOST=reverb
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fandrio

  # ── pgAdmin ────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fandrio_pgadmin
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@fandrio.mg}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fandrio

volumes:
  pgdata:
  pgadmin_data:

networks:
  fandrio:
    driver: bridge
