[PHP]
; Timezone
date.timezone = UTC

; Upload
upload_max_filesize = 10M
post_max_size = 12M

; Memory
memory_limit = 256M

; Opcache
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

; Error reporting (overridden by APP_DEBUG in Laravel)
display_errors = Off
log_errors = On
